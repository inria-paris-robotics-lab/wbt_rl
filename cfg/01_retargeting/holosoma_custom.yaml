# holosoma_custom retargeter — WBT-RL module config
# Repo: Guillaume-Bsst/holosoma_custom (src/holosoma_retargeting/)
# Inherits all fields from holosoma.yaml; only differences are listed here.

base: holosoma

native_output_format: holosoma_custom_qpos_npz

robot_config:
  G1_29dof:
    urdf: modules/01_retargeting/holosoma_custom/models/g1/g1_29dof.urdf
  G1_27dof:
    urdf: modules/01_retargeting/holosoma_custom/models/g1/g1_27dof.urdf

entry_points:
  single:
    cmd: python examples/robot_retarget.py
    cwd: modules/01_retargeting/holosoma_custom
    args:
      input_dir:   --data_path
      output_dir:  --save_dir
      task_type:   --task-type
      task_name:   --task-name
      data_format: --data_format
      robot_urdf:  --robot-config.robot-urdf-file
      robot_dof:   --robot-config.robot-dof
      visualize:   --retargeter.visualize
      debug:       --retargeter.debug
  batch:
    cmd: python examples/parallel_robot_retarget.py
    cwd: modules/01_retargeting/holosoma_custom
    args:
      input_dir:   --data-dir
      output_dir:  --save_dir
      task_type:   --task-type
      data_format: --data_format
      robot_urdf:  --robot-config.robot-urdf-file
      robot_dof:   --robot-config.robot-dof
      object_name: --task-config.object-name
